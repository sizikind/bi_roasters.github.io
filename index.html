<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прожарка BI-отчетов 🔥</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #ff5e00;
            --accent-hover: #ff7c30;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 94, 0, 0.3);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px 20px;
            margin-bottom: 30px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.2s;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent-color);
        }

        #report-name {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.4;
            color: #fff;
            word-break: break-word;
            transition: transform 0.1s ease-out, color 0.3s ease, text-shadow 0.3s ease;
        }

        .placeholder {
            color: var(--text-muted) !important;
            font-weight: normal !important;
            font-style: italic;
            font-size: 1.2rem !important;
        }

        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(255, 94, 0, 0.2);
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #30363d;
            color: #8b949e;
            cursor: not-allowed;
            box-shadow: none;
        }

        .error-message {
            color: #ff4a4a;
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Прожарка Отчетов 🔥</h1>
        <p class="subtitle">Случайный выбор жертвы для деструктивного фидбека</p>

        <div class="card">
            <div id="report-name" class="placeholder">Нажмите кнопку, чтобы выбрать отчет...</div>
        </div>

        <button id="spin-btn" onclick="getRandomReport()">ВЫБРАТЬ ОТЧЕТ</button>
        <div id="error-log" class="error-message"></div>
    </div>

    <script>
        // Ваша ссылка на Google Таблицу в формате CSV
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT84DafA4Dnj1s9HXCLpgEkV774xpA3shHecKDRPbJXoZPuJ2xBLmL8632rDysb99TsrwOiMefUbmJg/pub?gid=1285220382&single=true&output=csv';

        let reports = [];

        async function loadReports() {
            const errorLog = document.getElementById('error-log');
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('Не удалось загрузить данные');
                
                const csvText = await response.text();
                
                // Парсим строки CSV
                reports = csvText
                    .split(/\r?\n/)
                    .map(row => {
                        // Очищаем от возможных кавычек, которые добавляет CSV для строк с запятыми
                        return row.replace(/^"|"$/g, '').trim();
                    })
                    .filter(row => row.length > 0);

                // Если первая строчка — это заголовок таблицы, убираем её из рандомайзера
                const firstRowLower = reports[0]?.toLowerCase() || '';
                if (reports.length > 0 && (firstRowLower.includes('назван') || firstRowLower.includes('report') || firstRowLower.includes('отчет'))) {
                    reports.shift();
                }

                if (reports.length === 0) {
                    throw new Error('Таблица пуста');
                }
            } catch (error) {
                console.error(error);
                errorLog.textContent = 'Ошибка загрузки списка отчетов. Проверьте публикацию таблицы.';
            }
        }

        let isSpinning = false;

        function getRandomReport() {
            if (reports.length === 0 || isSpinning) return;

            const reportDisplay = document.getElementById('report-name');
            const btn = document.getElementById('spin-btn');
            
            isSpinning = true;
            btn.disabled = true;
            reportDisplay.classList.remove('placeholder');

            // Сброс визуальных эффектов с прошлого круга
            reportDisplay.style.color = '#fff';
            reportDisplay.style.textShadow = 'none';
            reportDisplay.style.transform = 'scale(1)';

            let currentDelay = 35;  // Начальная скорость перелистывания (очень быстрая)
            const maxDelay = 600;   // Скорость полной остановки
            const deceleration = 1.15; // Постепенное замедление
            let lastIndex = -1;

            function tick() {
                let randomIndex;
                // Исключаем повторение одного и того же отчета два раза подряд во время прокрутки
                do {
                    randomIndex = Math.floor(Math.random() * reports.length);
                } while (reports.length > 1 && randomIndex === lastIndex);
                
                lastIndex = randomIndex;
                reportDisplay.textContent = reports[randomIndex];

                // Легкая визуальная вибрация текста при быстром вращении барабана
                reportDisplay.style.transform = `scale(${1 + Math.random() * 0.04})`;

                if (currentDelay < maxDelay) {
                    currentDelay *= deceleration;
                    setTimeout(tick, currentDelay);
                } else {
                    // Конец прокрутки
                    isSpinning = false;
                    btn.disabled = false;

                    // Огненное выделение финального выбора
                    reportDisplay.style.color = 'var(--accent-color)';
                    reportDisplay.style.textShadow = '0 0 25px rgba(255, 94, 0, 0.8), 0 0 10px rgba(255, 94, 0, 0.5)';
                    reportDisplay.style.transform = 'scale(1.15)';
                }
            }

            tick();
        }

        loadReports();
    </script>
</body>
</html>
