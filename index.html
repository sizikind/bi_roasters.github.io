<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прожарка BI-отчетов 🔥</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #ff5e00;
            --accent-hover: #ff7c30;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            max-width: 650px;
            width: 100%;
            z-index: 2;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 94, 0, 0.3);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 50px 25px;
            margin-bottom: 30px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        /* Анимация тряски при финальном горении */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .card.shake-on {
            animation: shake 0.4s;
            animation-iteration-count: infinite;
            border-color: var(--accent-color);
            box-shadow: 0 0 30px rgba(255, 94, 0, 0.4);
        }

        #report-name {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.4;
            color: #fff;
            word-break: break-word;
            transition: transform 0.1s ease-out, color 0.4s ease;
        }

        /* Саспенс-субтитры */
        #suspense-text {
            height: 24px;
            margin-top: 15px;
            font-size: 1rem;
            font-style: italic;
            color: #ffaa00;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.15s ease-in-out;
        }

        .placeholder {
            color: var(--text-muted) !important;
            font-weight: normal !important;
            font-style: italic;
            font-size: 1.2rem !important;
        }

        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(255, 94, 0, 0.3);
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: scale(1.03);
        }

        button:active:not(:disabled) {
            transform: scale(0.97);
        }

        button:disabled {
            background-color: #30363d;
            color: #8b949e;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Вылетающие огоньки */
        .spark {
            position: absolute;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 999;
            animation: fly-away 1.5s ease-out forwards;
        }

        @keyframes fly-away {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0) rotate(var(--r));
                opacity: 0;
            }
        }

        .error-message {
            color: #ff4a4a;
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Прожарка BI-отчетов 🔥</h1>
        <p class="subtitle">Случайный выбор борда для общего разбора и фидбека</p>

        <div id="card-element" class="card">
            <div id="report-name" class="placeholder">Нажмите кнопку, чтобы запустить подбор...</div>
            <div id="suspense-text"></div>
        </div>

        <button id="spin-btn" onclick="getRandomReport()">ЗАПУСТИТЬ РУЛЕТКУ</button>
        <div id="error-log" class="error-message"></div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT84DafA4Dnj1s9HXCLpgEkV774xpA3shHecKDRPbJXoZPuJ2xBLmL8632rDysb99TsrwOiMefUbmJg/pub?gid=1285220382&single=true&output=csv';

        let reports = [];

        // Забавные фразы во время напряжения
        const suspensePhrases = [
            "Мммм, снова табличка на 40 столбцов",
            "Да у тебя тут многие-ко-многим!",
            "Что-то шрифты совсем поплыли",
            "Как удобно когда фильтры снизу!",
            "Загрузка отчета длится вечность...",
            "Как это вообще оказалось на проде?",
            "Цветовая палитра впечатляет",
            "Какие прекрасные филд параметры",
            "Как здесь разобраться?",
            "А документацию можно посмотреть?"
        ];

        async function loadReports() {
            const errorLog = document.getElementById('error-log');
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('Не удалось загрузить данные');
                
                const csvText = await response.text();
                
                reports = csvText
                    .split(/\r?\n/)
                    .map(row => row.replace(/^"|"$/g, '').trim())
                    .filter(row => row.length > 0);

                const firstRowLower = reports[0]?.toLowerCase() || '';
                if (reports.length > 0 && (firstRowLower.includes('назван') || firstRowLower.includes('report') || firstRowLower.includes('отчет'))) {
                    reports.shift();
                }

                if (reports.length === 0) {
                    throw new Error('Таблица пуста');
                }
            } catch (error) {
                console.error(error);
                errorLog.textContent = 'Ошибка загрузки списка отчетов. Проверьте публикацию таблицы.';
            }
        }

        let isSpinning = false;

        function createFlameSparks() {
            const card = document.getElementById('card-element');
            const rect = card.getBoundingClientRect();
            
            // Генерируем 15 летающих огоньков из центра карточки
            for (let i = 0; i < 15; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark';
                spark.textContent = '🔥';
                
                // Рандомное направление полета
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 150;
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                const rotation = Math.random() * 360;

                spark.style.setProperty('--x', `${x}px`);
                spark.style.setProperty('--y', `${y}px`);
                spark.style.setProperty('--r', `${rotation}deg`);

                // Позиционируем в центре карточки
                spark.style.left = `${rect.width / 2 - 15}px`;
                spark.style.top = `${rect.height / 2 - 15}px`;

                card.appendChild(spark);
                
                // Удаляем после завершения анимации
                setTimeout(() => spark.remove(), 1500);
            }
        }

        function getRandomReport() {
            if (reports.length === 0 || isSpinning) return;

            const reportDisplay = document.getElementById('report-name');
            const suspenseDisplay = document.getElementById('suspense-text');
            const cardElement = document.getElementById('card-element');
            const btn = document.getElementById('spin-btn');
            
            isSpinning = true;
            btn.disabled = true;
            reportDisplay.classList.remove('placeholder');

            // Сброс старых эффектов
            reportDisplay.style.color = '#fff';
            reportDisplay.style.textShadow = 'none';
            reportDisplay.style.transform = 'scale(1)';
            cardElement.classList.remove('shake-on');
            suspenseDisplay.style.opacity = '0';

            let currentDelay = 20;    // Стартовая супер-скорость
            const maxDelay = 1100;    // Максимальное замедление в самом конце (больше 1 секунды!)
            const deceleration = 1.09; // Плавность замедления (крутится ОЧЕНЬ долго)
            let lastIndex = -1;

            // Смена шутливых фраз во время интриги
            let phrasesInterval = setInterval(() => {
                if (currentDelay > 150) { // Начинаем показывать фразы, когда крутилка чуть замедлилась
                    suspenseDisplay.textContent = suspensePhrases[Math.floor(Math.random() * suspensePhrases.length)];
                    suspenseDisplay.style.opacity = '1';
                }
            }, 800);

            function tick() {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * reports.length);
                } while (reports.length > 1 && randomIndex === lastIndex);
                
                lastIndex = randomIndex;
                reportDisplay.textContent = reports[randomIndex];

                // Сила вибрации текста зависит от текущей скорости
                const scaleModifier = Math.max(0.01, 0.05 * (1 - currentDelay / maxDelay));
                reportDisplay.style.transform = `scale(${1 + Math.random() * scaleModifier})`;

                if (currentDelay < maxDelay) {
                    currentDelay *= deceleration;
                    setTimeout(tick, currentDelay);
                } else {
                    // ФИНАЛ ШОУ!
                    clearInterval(phrasesInterval);
                    isSpinning = false;
                    btn.disabled = false;

                    // Прячем промежуточную фразу, пишем вердикт
                    suspenseDisplay.textContent = "💥 КАНДИДАТ ГОТОВ! 💥";
                    suspenseDisplay.style.color = "#ff4a4a";

                    // Карточка начинает жестко трястись от напряжения
                    cardElement.classList.add('shake-on');

                    // Название отчета загорается адским пламенем
                    reportDisplay.style.color = '#ff3c00';
                    reportDisplay.style.textShadow = '0 0 20px #ff3c00, 0 0 40px #ff7c00';
                    reportDisplay.style.transform = 'scale(1.25)';

                    // Запускаем взрыв огненных смайликов
                    createFlameSparks();

                    // Останавливаем тряску карточки через 2 секунды, но огонь оставляем
                    setTimeout(() => {
                        cardElement.classList.remove('shake-on');
                    }, 2000);
                }
            }

            tick();
        }

        loadReports();
    </script>
</body>
</html>
